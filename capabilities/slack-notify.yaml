name: slack.notify
description: Post a message to a Slack channel via an Incoming Webhook URL.
sideEffect: message-human
estimateCents: 0
http:
  url: "{{secret:slack-webhook}}"
  method: POST
  headers:
    Content-Type: "application/json"
  body:
    text: "{{input.message}}"
input:
  message:
    type: string
    required: true
    description: The message text to post.
successCodes:
  - 200
